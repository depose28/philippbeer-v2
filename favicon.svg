<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Monitor body -->
  <rect x="3" y="4" width="26" height="20" rx="3" fill="#2a2a2e" stroke="#3a3a3e" stroke-width="1"/>
  <!-- Screen bezel -->
  <rect x="5" y="6" width="22" height="16" rx="2" fill="#1e1e22"/>
  <!-- CRT screen -->
  <rect x="7" y="8" width="18" height="12" rx="1" fill="#141416"/>
  <!-- Orange cursor line -->
  <rect x="9" y="12" width="8" height="2" rx="0.5" fill="#e08a3a" opacity="0.9"/>
  <!-- Blinking cursor -->
  <rect x="18" y="12" width="2" height="2" rx="0.5" fill="#e08a3a">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Screen glow -->
  <rect x="7" y="8" width="18" height="12" rx="1" fill="#e08a3a" opacity="0.04"/>
  <!-- Stand -->
  <rect x="12" y="24" width="8" height="2" rx="0.5" fill="#2a2a2e"/>
  <!-- Base -->
  <rect x="9" y="26" width="14" height="2" rx="1" fill="#2a2a2e" stroke="#3a3a3e" stroke-width="0.5"/>
</svg>
